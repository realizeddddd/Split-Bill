<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spleetbeels</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <button class="btn-theme btn-clear" id="clearBtn" onclick="clearData()" aria-label="Clear all data">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="16" height="16"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="btn-theme" id="langToggle" onclick="toggleLang()" aria-label="Toggle language">🇮🇩 ID</button>
      <button class="btn-theme" id="themeToggle" aria-label="Toggle light/dark mode">🌙</button>
    </div>
    <h1>Spleetbeels</h1>
    <p class="header-sub">Split smarter, together</p>
  </header>

  <!-- Session Tabs -->
  <div class="tabs-bar" id="tabsBar">
    <div class="tabs-list" id="tabsList"></div>
    <button class="tab-new-btn" id="tabNewBtn" onclick="newSession()" aria-label="New bill">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      <span id="tab-new-label">New</span>
    </button>
  </div>

  <div class="event-name-wrap">
    <input id="eventName" type="text" placeholder="Event name" autocomplete="off" />
  </div>

  <main class="container">

    <!-- People -->
    <section class="card section-lockable" id="people-section" aria-labelledby="people-heading">
      <h2 id="people-heading"><svg class="card-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="7" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M3 19c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="17" cy="8" r="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M21 19c0-2.761-1.791-5-4-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>People</h2>
      <p class="section-lock-hint" id="people-lock-hint" aria-live="polite"></p>
      <form class="row" onsubmit="addPerson(); return false;">
        <label for="personInput" class="sr-only">Name</label>
        <input id="personInput" type="text" placeholder="Name" autocomplete="off" />
        <button type="submit" class="btn-primary btn-add-person">Add</button>
      </form>
      <ul class="tag-list" id="peopleList" aria-label="People list"></ul>
    </section>

    <!-- Items -->
    <section class="card section-lockable" id="items-section" aria-labelledby="items-heading">
      <h2 id="items-heading"><svg class="card-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Items</h2>
      <p class="section-lock-hint" id="items-lock-hint" aria-live="polite"></p>
      <p class="section-sub" id="section-sub-items">Enter item(s) manually</p>
      <form class="row" onsubmit="addItem(); return false;">
        <label for="itemName" class="sr-only">Item name</label>
        <input id="itemName" type="text" placeholder="Item name" autocomplete="off" />
        <label for="itemCost" class="sr-only">Cost</label>
        <input id="itemCost" type="number" placeholder="Cost" min="0" step="1" />
        <button type="submit" class="btn-primary btn-add-item">Add</button>
      </form>
      <ul class="item-list" id="itemList" aria-label="Item list"></ul>
    </section>

    <!-- Tip & Tax -->
    <section class="card section-lockable" id="extras-section" aria-labelledby="extras-heading">
      <h2 id="extras-heading"><svg class="card-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8.5" cy="8.5" r="2" stroke="currentColor" stroke-width="1.8"/><circle cx="15.5" cy="15.5" r="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 19L19 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Tip &amp; Tax</h2>
      <p class="section-lock-hint" id="extras-lock-hint" aria-live="polite"></p>
      <p class="extras-question" id="extras-question">Any tip or tax on this bill?</p>
      <fieldset class="extras">
        <legend class="sr-only">Tip, tax and split options</legend>

        <div class="extras-toggle-row">
          <label class="toggle-label" for="enableTip">
            <input type="checkbox" id="enableTip" onchange="toggleExtras()" />
            <span id="label-tip">Tip</span>
          </label>
          <div class="extras-input-wrap" id="tipWrap" style="display:none">
            <input id="tipAmt" type="number" value="0" min="0" step="1" oninput="render()" />
          </div>
        </div>

        <div class="extras-toggle-row">
          <label class="toggle-label" for="enableTax">
            <input type="checkbox" id="enableTax" onchange="toggleExtras()" />
            <span id="label-tax">Tax %</span>
          </label>
          <div class="extras-input-wrap" id="taxWrap" style="display:none">
            <input id="taxPct" type="number" value="0" min="0" max="100" step="0.5" oninput="render()" />
          </div>
        </div>

        <div class="extras-split-row" id="extrasSplitRow" style="display:none">
          <label id="label-extras" for="extrasMode">Split extras
            <select id="extrasMode" onchange="render()">
              <option value="equal">Equally</option>
              <option value="proportional">Proportionally</option>
            </select>
          </label>
        </div>

      </fieldset>
    </section>

    <!-- Summary -->
    <section class="card section-lockable" id="summary-section" aria-labelledby="summary-heading">
      <h2 id="summary-heading"><svg class="card-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="12" width="4" height="9" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="10" y="7" width="4" height="14" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="17" y="3" width="4" height="18" rx="1" stroke="currentColor" stroke-width="1.8"/></svg>Summary</h2>
      <p class="section-lock-hint" id="summary-lock-hint" aria-live="polite"></p>
      <ul class="summary-list" id="summaryList" aria-label="Per-person totals"></ul>
      <footer class="totals" id="totals" aria-label="Bill totals"></footer>
      <div class="share-buttons">
        <button class="btn-share btn-wa-text" id="wa-text-btn" onclick="shareWhatsAppText()">
          <svg class="btn-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="8" fill="#25D366"/>
            <path d="M16 5C10.477 5 6 9.477 6 15c0 1.9.528 3.674 1.443 5.185L6 27l6.978-1.42A9.953 9.953 0 0016 26c5.523 0 10-4.477 10-10S21.523 5 16 5z" fill="white"/>
            <path d="M21.5 18.5c-.3-.15-1.77-.87-2.04-.97-.28-.1-.48-.15-.68.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.47-.89-.79-1.49-1.76-1.66-2.06-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.68-1.63-.93-2.23-.24-.58-.49-.5-.68-.51-.17-.01-.37-.01-.57-.01-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.48 0 1.46 1.07 2.87 1.22 3.07.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.69.63.71.23 1.36.2 1.87.12.57-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.12-.27-.19-.57-.34z" fill="#25D366"/>
          </svg>
          <span id="wa-text-btn-label">Share as Text</span>
        </button>
        <button class="btn-share btn-wa-jpg" id="wa-jpg-btn" onclick="shareWhatsAppJPG()">
          <svg class="btn-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="8" fill="#10b981"/>
            <path d="M8 6h11l7 7v13a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.5"/>
            <path d="M19 6v7h7" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            <rect x="6" y="17" width="20" height="9" rx="2" fill="white"/>
            <text x="16" y="24" text-anchor="middle" font-size="6" font-weight="800" font-family="system-ui,sans-serif" fill="#10b981">JPG</text>
          </svg>
          <span id="wa-jpg-btn-label">Share as JPG</span>
        </button>
        <button class="btn-share btn-wa-pdf" id="wa-pdf-btn" onclick="shareWhatsAppPDF()">
          <svg class="btn-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="8" fill="#ef4444"/>
            <path d="M8 6h11l7 7v13a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2z" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.5"/>
            <path d="M19 6v7h7" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            <rect x="6" y="17" width="20" height="9" rx="2" fill="white"/>
            <text x="16" y="24" text-anchor="middle" font-size="6" font-weight="800" font-family="system-ui,sans-serif" fill="#ef4444">PDF</text>
          </svg>
          <span id="wa-pdf-btn-label">Share as PDF</span>
        </button>
      </div>
    </section>

    <!-- Print-only breakdown -->
    <section id="print-only">
      <h2>Items Breakdown</h2>
      <div id="print-breakdown"></div>
    </section>

    <div id="watermark" aria-hidden="true"></div>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
